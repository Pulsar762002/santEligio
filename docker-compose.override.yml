# Questo file viene letto automaticamente da Docker Compose in locale.
# In produzione usare: docker compose -f docker-compose.yml up

services:

  backend:
    build:
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev
    ports:
      - '3000:3000'   # esponi per debug diretto

  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run start -- --host 0.0.0.0 --poll 2000
    ports:
      - '4200:4200'   # Angular dev server

  nginx:
    volumes:
      # In dev sostituiamo il mount certbot (read-only, da docker-compose.yml) con un
      # volume vuoto e scrivibile: stesso target /etc/letsencrypt → l'override vince.
      # Così il bind del cert self-signed può essere montato nella sottocartella live/.
      - dev_letsencrypt:/etc/letsencrypt
      - ./nginx/ssl:/etc/letsencrypt/live/santeligio.it:ro   # self-signed in dev
    ports:
      - '8088:80'     # evita conflitti con porte sistema in dev

volumes:
  dev_letsencrypt:
