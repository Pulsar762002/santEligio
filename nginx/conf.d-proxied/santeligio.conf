# ─────────────────────────────────────────────────────────────
# VHOST per deployment DIETRO un Nginx host (reverse proxy esterno).
# Niente SSL/redirect qui: il TLS lo termina l'Nginx dell'host, che
# inoltra in HTTP puro a questo container (porta 8090 → 80).
# Usato da docker-compose.behind-proxy.yml.
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;            # il filtro per dominio lo fa l'Nginx host

    # ── Real IP ───────────────────────────────────────────────
    # Dietro al proxy host il $remote_addr sarebbe sempre l'IP del
    # proxy: recuperiamo il client reale per rate-limit e log corretti.
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 172.16.0.0/12;   # reti bridge Docker
    set_real_ip_from 10.0.0.0/8;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    client_max_body_size 20M;

    # ── Security headers (HSTS lo mette l'Nginx host sul TLS) ──
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob:;"
        always;

    # ─────────────────────────────────────────────────────────
    # /api  →  NestJS backend (porta 3000)
    # ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Siamo sempre dietro HTTPS dell'host: forziamo https a valle
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─────────────────────────────────────────────────────────
    # /uploads  →  file statici (immagini, PDF bollettini)
    # ─────────────────────────────────────────────────────────
    location /uploads/ {
        alias   /usr/share/nginx/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─────────────────────────────────────────────────────────
    # /  →  Angular SPA (dist build)
    # ─────────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;

        root  /usr/share/nginx/html;
        index index.html;

        location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
        }

        try_files $uri $uri/ /index.html;
    }
}
