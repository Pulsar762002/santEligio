# ─────────────────────────────────────────────────────────────
# Redirect HTTP → HTTPS
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name santeligio.it www.santeligio.it;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# HTTPS — sito principale
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name santeligio.it www.santeligio.it;

    # ── SSL ───────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/santeligio.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/santeligio.it/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob:;"
        always;

    # ── Upload size ───────────────────────────────────────────
    client_max_body_size 20M;

    # ─────────────────────────────────────────────────────────
    # /api  →  NestJS backend (porta 3000)
    # ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─────────────────────────────────────────────────────────
    # /uploads  →  file statici (immagini, PDF bollettini)
    # ─────────────────────────────────────────────────────────
    location /uploads/ {
        alias   /usr/share/nginx/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ─────────────────────────────────────────────────────────
    # /  →  Angular SPA (dist build)
    # ─────────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;

        root  /usr/share/nginx/html;
        index index.html;

        # Cache aggressiva per assets con hash nel nome
        location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
        }

        # SPA fallback: qualsiasi route Angular → index.html
        try_files $uri $uri/ /index.html;
    }
}
