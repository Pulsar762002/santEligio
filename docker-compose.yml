services:

  # ─────────────────────────────────────────
  # NGINX — reverse proxy + static frontend
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: santeligio_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - frontend_build:/usr/share/nginx/html:ro
      - uploads_data:/usr/share/nginx/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - santeligio_net

  # ─────────────────────────────────────────
  # FRONTEND — Angular (build stage)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build
    container_name: santeligio_frontend
    volumes:
      - frontend_build:/app/dist/frontend/browser
    networks:
      - santeligio_net

  # ─────────────────────────────────────────
  # BACKEND — NestJS API
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: santeligio_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://santeligio_app:${MONGO_APP_PASSWORD:?err}@mongo:27017/${MONGO_DB_NAME:-santeligio}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - santeligio_net

  # ─────────────────────────────────────────
  # MONGODB
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: santeligio_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?err}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-santeligio}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?err}
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - santeligio_net

  # ─────────────────────────────────────────
  # CERTBOT — rinnovo automatico SSL
  # ─────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: santeligio_certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'
    networks:
      - santeligio_net

  # ─────────────────────────────────────────
  # MONGO EXPRESS — admin UI (solo dev)
  # ─────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0
    container_name: santeligio_mongoexpress
    restart: unless-stopped
    profiles:
      - dev
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:?err}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGOEXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGOEXPRESS_PASSWORD:-secret}
    ports:
      - '8081:8081'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - santeligio_net

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local
  frontend_build:
    driver: local

# ─────────────────────────────────────────
# NETWORK
# ─────────────────────────────────────────
networks:
  santeligio_net:
    driver: bridge
